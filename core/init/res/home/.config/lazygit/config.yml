# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
customCommands:
  - key: "K"
    context: "files"
    description: "Create new conventional commit"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "build"
            description: "Changes that affect the build system or external dependencies"
            value: "build"
          - name: "feat"
            description: "A new feature"
            value: "feat"
          - name: "fix"
            description: "A bug fix"
            value: "fix"
          - name: "chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "ci"
            description: "Changes to CI configuration files and scripts"
            value: "ci"
          - name: "docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "perf"
            description: "A code change that improves performance"
            value: "perf"
          - name: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "revert"
            description: "Reverts a previous commit"
            value: "revert"
          - name: "style"
            description: "Changes that do not affect the meaning of the code"
            value: "style"
          - name: "test"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
      - type: "menu"
        key: "Scope"
        title: "(optional) Scope of change"
        options:
          - name: "<none>"
            description: "Bypass scope"
            value: "none"
          - name: "ui"
            description: "Changes related to the frontend application or UI components"
            value: "ui"
          - name: "db"
            description: "Database schema, queries, migrations, or connection logic"
            value: "db"
          - name: "api"
            description: "REST controllers endpoints, api service logic, orm persistence"
            value: "api"
          - name: "auth"
            description: "Authentication and authorization logic, tokens, sessions, permissions"
            value: "auth"
          - name: "style"
            description: "Styling, themes, layout, or linting in general"
            value: "style"
          - name: "core"
            description: "Core business logic, domain models, or application logic"
            value: "core"
          - name: "shared"
            description: "Shared code, libraries, or utilities used by both frontend and backend"
            value: "shared"
          - name: "ci"
            description: "Continuous integration or deployment pipeline configuration"
            value: "ci"
          - name: "docs"
            description: "Documentation updates, including READMEs and inline docs"
            value: "docs"
          - name: "ai"
            description: "AI/ML models, prompts, embeddings, or LLM integration"
            value: "ai"
          - name: "cli"
            description: "Command-line interfaces, terminals, or shell integrations"
            value: "cli"
          - name: "build"
            description: "Build system, dependencies, or compilation process"
            value: "build"
          - name: "config"
            description: "Configuration files, settings, or environment variables"
            value: "config"
          - name: "types"
            description: "Type definitions, interfaces, or type safety improvements"
            value: "types"
          - name: "security"
            description: "Security fixes, vulnerabilities"
            value: "security"
          - name: "devops"
            description: "DevOps, infrastructure, Docker, Kubernetes, or deployment"
            value: "devops"
          - name: "tools"
            description: "Development tools, scripts, CLIs, or utilities"
            value: "tools"
      - type: "menu"
        key: "Breaking"
        title: "Breaking change?"
        options:
          - name: "no"
            value: "no"
          - name: "yes"
            value: "!"
      - type: "input"
        title: "Short & meaningful summary description (10 words max)"
        key: "Description"
        initialValue: ""
      - type: "input"
        title: '{{if eq .Form.Breaking "no"}}(optional) {{else}}BREAKING CHANGE {{end}}Body'
        key: "Body"
        initialValue: ""
      - type: "input"
        title: "(optional) Related ticket number without '#'. Leave empty if none."
        key: "Ticket"
        initialValue: ""
      - type: "confirm"
        key: "Confirm"
        title: "Commit"
        body: "Are you sure you want to commit?"
    command: >
      git commit
      --message '{{.Form.Type}}{{if and .Form.Scope (ne .Form.Scope "none")}}({{.Form.Scope}}){{end}}{{if ne .Form.Breaking "no"}}{{.Form.Breaking}}{{end}}: {{.Form.Description}}{{if .Form.Ticket}} (#{{.Form.Ticket}}){{end}}'
      {{if .Form.Body}}--message "{{if ne .Form.Breaking "no"}}BREAKING CHANGE: {{end}}{{.Form.Body}}"{{end}}
      {{if .Form.Ticket}}--message "refers to #{{.Form.Ticket}}"{{end}}

    loadingText: "Creating conventional commit..."
